services:
  fb-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fb-manager
    ports:
      # 限制只有宿主机本地可以访问容器
      - "127.0.0.1:8000:8000"
    environment:
      # 使用不含特殊字符的稳健强密码，避免环境变量解析冲突
      - ADMIN_PASSWORD=GeminiManager2026
      - TZ=Asia/Shanghai
    volumes:
      # 持久化数据库
      - ../data:/app/data
      # 持久化并方便宿主机查看日志
      - ../logs:/app/logs
    restart: unless-stopped
